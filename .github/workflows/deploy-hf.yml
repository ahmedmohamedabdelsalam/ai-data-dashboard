name: Sync to Hugging Face hub
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Write HF Space README
        run: |
          cat > README.md << 'EOF'
          ---
          title: AI Data Dashboard API
          emoji: chart_with_upwards_trend
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          # AI Data Analysis Dashboard Backend API
          FastAPI backend providing endpoints for analysis, anomaly detection, and AI-powered insights.
          EOF
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://Abdelsalam-1:$HF_TOKEN@huggingface.co/spaces/Abdelsalam-1/ai-data-dashboard-api master:main
